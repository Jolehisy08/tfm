base_local_planner:
  DWAPlannerROS:

    # --- Velocity Limits ---
    max_vel_x: 0.5
    min_vel_x: -0.5
    max_vel_y: 0.0
    min_vel_y: 0.0
    max_trans_vel: 0.5
    min_trans_vel: 0.10

    min_vel_trans: 0.1

    # --- Rotational velocity ---
    max_vel_theta: 2.0
    min_vel_theta: -2.0
    max_rot_vel: 0.86
    min_rot_vel: 0.2

    # --- Accelerations ---
    acc_lim_x: 1.0
    acc_lim_y: 0.0
    acc_lim_theta: 1.0

    # --- Simulation ---
    sim_time: 1.7
    vx_samples: 10
    vtheta_samples: 30

    # --- Cost function tuning (CLAVE) ---
    path_distance_bias: 16.0
    goal_distance_bias: 24.0
    occdist_scale: 1.0

    # --- Goal tolerances ---
    xy_goal_tolerance: 0.15
    yaw_goal_tolerance: 0.2
    latch_xy_goal_tolerance: false

    # Mejora el comportamiento al esquivar
    #forward_point_distance: 0.3
