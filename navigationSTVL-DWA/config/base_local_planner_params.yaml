DWAPlannerROS:

    # --- Velocity Limits ---
    max_vel_x: 0.5
    min_vel_x: 0.0
    
    penalize_negative_x: true

    # --- Rotational velocity ---
    max_vel_theta: 2.0
    min_vel_theta: 0.4

    # --- Accelerations ---
    acc_lim_x: 1.0
    acc_lim_y: 0.0
    acc_lim_theta: 1.0

    # --- Simulation ---
    sim_time: 1.7
    vx_samples: 10
    vtheta_samples: 30

    # --- Cost function tuning (CLAVE) ---
    path_distance_bias: 32
    goal_distance_bias: 20
    occdist_scale: 0.1

    # --- Goal tolerances ---
    xy_goal_tolerance: 0.15
    yaw_goal_tolerance: 0.2
    latch_xy_goal_tolerance: false

    # Mejora el comportamiento al esquivar
    forward_point_distance: 0.3
