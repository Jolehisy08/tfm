DWAPlannerROS:

    # --- Velocity Limits ---
    max_vel_x: 0.5
    min_vel_x: -0.1
    
    penalize_negative_x: true

    # --- Rotational velocity ---
    max_vel_theta: 2.0
    min_vel_theta: 0.4

    # --- Accelerations ---
    acc_lim_x: 2.5
    acc_lim_y: 0.0
    acc_lim_theta: 3.0

    # --- Simulation ---
    sim_time: 1.5
    vx_samples: 20
    vtheta_samples: 60

    # --- Cost function tuning ---
    path_distance_bias: 32
    goal_distance_bias: 20
    occdist_scale: 0.05
    oscillation_reset_dist: 0.5

    # --- Goal tolerances ---
    xy_goal_tolerance: 0.2
    yaw_goal_tolerance: 0.2
    latch_xy_goal_tolerance: true

    # Mejora el comportamiento al esquivar
    forward_point_distance: 0.1
