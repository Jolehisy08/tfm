local_costmap:
   global_frame: odom
   robot_base_frame: base_link
   update_frequency: 5.0 
   publish_frequency: 10.0 
   static_map: false
   rolling_window: true
   width: 10.0
   height: 10.0
   resolution: 0.025 

   plugins:
    - {name: stvl_layer,      type: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}