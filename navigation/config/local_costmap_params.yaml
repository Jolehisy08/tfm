# Local costmap parameters for the Pioneer robot navigation stack.
# This file defines the parameters for the local costmap, which is used for local path planning
local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  # The update frequency is the rate at which the costmap will be updated with new sensor data. 
  update_frequency: 5.0
  # The publish frequency is the rate at which the costmap will be published to other nodes in the ROS system. 
  publish_frequency: 5.0
  # The static_map parameter indicates whether the costmap should use a static map of the environment. If set to true, the costmap will not update with new sensor data and will rely solely on the static map. If set to false, the costmap will update with new sensor data to reflect changes in the environment.
  static_map: false
  # The rolling_window parameter indicates whether the costmap should use a rolling window around the robot. If set to true, the costmap will only keep a fixed area around the robot, which can help to reduce memory usage and improve performance. If set to false, the costmap will keep a larger area of the environment, which can be useful for global path planning but may require more memory and processing power.
  rolling_window: true
  # The width and height parameters define the size of the local costmap in meters. The resolution parameter defines the size of each cell in the costmap in meters. A smaller resolution will result in a more detailed costmap but will require more memory and processing power.
  width: 5.0
  height: 5.0
  resolution: 0.05
  transform_tolerance: 1.0