# Costmap parameters for the local costmap used in the Pioneer navigation stack. This file defines the configuration for the local costmap, 
# including the plugins used and their specific parameters.
local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 5.0
  publish_frequency: 5.0
  static_map: false
  rolling_window: true
  width: 5.0
  height: 5.0
  resolution: 0.05
  transform_tolerance: 1.0
  
  # Plugins used in the local costmap. We have the Spatio-Temporal Voxel Layer (STVL) for dynamic obstacle handling 
  # Inflation Layer to create a safety buffer around obstacles.
  plugins:
    - {name: stvl_layer,      type: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}